name: Bug report
description: Something's not working as expected
labels: [bug]
body:
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: "2026.5.2"
    validations:
      required: true
  - type: input
    id: integration_version
    attributes:
      label: Integration version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: vacuum_model
    attributes:
      label: Shark vacuum model
      placeholder: "Shark IQ RV1001AE"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What's happening?
      description: Describe the problem and what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Home Assistant logs
      description: Paste the `sharkiq_local_unofficial` lines from Settings → System → Logs. Set debug logging first if you can — see the README.
      render: shell
