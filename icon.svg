<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <radialGradient id="vacBody" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="256" height="256" rx="48" fill="url(#bg)"/>

  <g transform="translate(128, 96)">
    <!-- Shadow under vacuum -->
    <ellipse cx="0" cy="46" rx="48" ry="6" fill="#000" fill-opacity="0.25"/>

    <!-- Body (full circle, top-down view) -->
    <circle cx="0" cy="0" r="46" fill="url(#vacBody)" stroke="#475569" stroke-width="2"/>

    <!-- Outer rim accent -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>

    <!-- Inner sensor dome -->
    <circle cx="0" cy="0" r="16" fill="#0f172a"/>
    <circle cx="0" cy="0" r="11" fill="#1e293b"/>
    <!-- LED highlight -->
    <circle cx="-3" cy="-4" r="3" fill="#22d3ee"/>

    <!-- Side brush indicators -->
    <circle cx="-36" cy="20" r="3.5" fill="#cbd5e1" stroke="#64748b" stroke-width="1"/>
    <circle cx="36" cy="20" r="3.5" fill="#cbd5e1" stroke="#64748b" stroke-width="1"/>
  </g>

  <g font-family="'Helvetica Neue', Arial, sans-serif" text-anchor="middle" fill="#ffffff">
    <text x="128" y="190" font-size="34" font-weight="800" letter-spacing="2">SHARK</text>
    <text x="128" y="218" font-size="20" font-weight="400" letter-spacing="6" opacity="0.9">LOCAL</text>
  </g>
</svg>
